name: Build Android APK

on:
  workflow_dispatch: # 手动触发
  pull_request:
    branches: ["main"]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'rust/**'
      - 'pubspec.yaml'
      - '.github/workflows/build_android_apk.yml'
  push:
    branches: ["main"]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'rust/**'
      - 'pubspec.yaml'
      - '.github/workflows/build_android_apk.yml'

jobs:
  build-unsigned-apk:
    name: Build Unsigned APK
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set Commit SHA
        run: echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 配置 Java 环境
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 配置 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
          cache: true

      # 获取依赖
      - name: Flutter Pub Get
        run: flutter pub get

      # 构建免签 APK
      - name: Build Unsigned APK
        run: flutter build apk --release --verbose --dart-define=COMMIT_ID=$COMMIT_SHA

      # 重命名 APK
      - name: Rename APK
        run: |
          APK_PATH="$(find build/app/outputs/flutter-apk -maxdepth 1 -type f -name 'app-release*.apk' -print -quit)"
          test -n "$APK_PATH"
          cp "$APK_PATH" novella-unsigned.apk

      # 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: novella-android-unsigned-apk
          path: novella-unsigned.apk

  build-signed-apk:
    name: Build Signed APK
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set Commit SHA
        run: echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 配置 Java 环境
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 配置 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
          cache: true

      # 获取依赖
      - name: Flutter Pub Get
        run: flutter pub get

      # 还原 Release Keystore
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ENCODED_STRING" | base64 --decode > android/app/release.keystore

      # 构建 APK
      - name: Build Android APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --verbose --dart-define=COMMIT_ID=$COMMIT_SHA

      # 重命名 APK
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk novella.apk

      # 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: novella-android-signed-apk
          path: novella.apk
