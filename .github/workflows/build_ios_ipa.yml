name: Build iOS IPA

on:
  workflow_dispatch: # 手动触发
  pull_request:
    branches: ["main"]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'macos/Novella.icon/**'
      - 'rust/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'firebase.json'
      - '.github/workflows/build_ios_ipa.yml'
  push:
    branches: ["main"]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'macos/Novella.icon/**'
      - 'rust/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'firebase.json'
      - '.github/workflows/build_ios_ipa.yml'

jobs:
  build-ipa:
    name: Build Unsigned IPA
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0

      - name: Restore Git LFS Cache
        uses: actions/cache@v5
        with:
          path: .git/lfs/objects
          key: lfs-ios-${{ runner.os }}-${{ hashFiles('ios/libs/**', 'ios/Runner/Assets.xcassets/**', 'macos/Novella.icon/**') }}
          restore-keys: |
            lfs-ios-${{ runner.os }}-

      - name: Pull Required Git LFS Files
        run: |
          git lfs install --local
          git lfs pull --include="ios,macos/Novella.icon" --exclude=""

      - name: Set Build Metadata
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BUILD_NUMBER="$(git rev-list --count origin/main)"
            BUILD_CHANNEL="pr"
            BUILD_LABEL="PR #${{ github.event.pull_request.number }}"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            BUILD_NUMBER="$(git rev-list --count HEAD)"
            BUILD_CHANNEL="main"
            BUILD_LABEL="Build $BUILD_NUMBER"
          else
            BUILD_NUMBER="$(git rev-list --count origin/main)"
            BUILD_CHANNEL="branch"
            BUILD_LABEL="$GITHUB_REF_NAME"
          fi

          {
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "BUILD_CHANNEL=$BUILD_CHANNEL"
            echo "BUILD_LABEL=$BUILD_LABEL"
          } >> "$GITHUB_ENV"

      # 指定 Xcode 26
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      # 配置 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
          cache: true

      # 预缓存 iOS 引擎工件
      - name: Precache Flutter iOS Artifacts
        run: flutter precache --ios

      # 获取依赖
      - name: Flutter Pub Get
        run: flutter pub get

      # 写入 iOS Firebase API key
      - name: Inject iOS Firebase API Key
        env:
          FIREBASE_IOS_API_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_IOS_API_KEY:-}" ]; then
            if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ]; then
              echo "Firebase iOS API key secret is unavailable for this PR; keeping placeholder key for build-only validation."
              exit 0
            fi
            echo "::error::Missing FIREBASE_IOS_API_KEY secret."
            exit 1
          fi
          perl -0pi -e 's/__FIREBASE_IOS_API_KEY__/$ENV{FIREBASE_IOS_API_KEY}/g' \
            lib/firebase_options.dart \
            ios/Runner/GoogleService-Info.plist

      # FlutterFire Crashlytics dSYM 上传脚本需要 flutterfire 命令
      - name: Install FlutterFire CLI
        if: github.event_name != 'pull_request'
        run: dart pub global activate flutterfire_cli

      # 安装 Pods 生成项目文件
      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod install
          cd ..

      # 移除所有签名配置
      - name: Nuke Code Signing
        run: |
          echo "☢️ Nuking code signing configurations..."
          
          # 处理 Runner 项目
          echo "   -> Patching Runner.xcodeproj..."
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 处理 Pods 项目
          echo "   -> Patching Pods.xcodeproj..."
          # 将 Pods 项目中的所有签名要求强制改为 Manual 和 空
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' ios/Pods/Pods.xcodeproj/project.pbxproj

          # 处理 xcconfig
          echo "   -> Patching Release.xcconfig..."
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY =" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_STYLE = Manual" >> ios/Flutter/Release.xcconfig
          
          echo "✅ Code signing configurations nuked for EVERYTHING."

      # 构建免签 Release
      - name: Build iOS Release (No Codesign)
        run: |
          flutter build ios --release --no-codesign --verbose \
            --build-number="$BUILD_NUMBER" \
            --dart-define=BUILD_CHANNEL="$BUILD_CHANNEL" \
            --dart-define=BUILD_LABEL="$BUILD_LABEL"

      # 打包 IPA
      - name: Package IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload
          zip -r novella.ipa Payload

      # 上传产物
      - name: Upload IPA
        uses: actions/upload-artifact@v6
        with:
          name: novella-unsigned-ipa
          path: novella.ipa
