<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Novella</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #171a1d;
      color: #f3f4f6;
      font: 16px/1.6 system-ui, sans-serif;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      padding: 40px 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(24, 28, 34, 0.96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #e5e7eb;
      font-size: 14px;
    }

    h1 {
      margin: 20px 0 16px;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: #b4bac4;
      font-size: 18px;
    }

    .actions {
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 14px;
      background: linear-gradient(180deg, #2d7ff5 0%, #1952d1 100%);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main>
    <span class="badge">404 Not Found</span>
    <h1>这个页面不存在</h1>
    <p>当前访问的路径没有对应的站点页面。</p>
    <div class="actions">
      <a href="/">返回首页</a>
    </div>
  </main>
</body>

</html>
